version: '3.9'

services:
  # ─────────────────────────────
  # Base de données PostgreSQL
  # ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: compliara_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - compliara_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────
  # Backend NestJS
  # ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: compliara_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      NODE_ENV: development
      PORT: 3000
    volumes:
      - ./backend:/app
      - backend_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - compliara_network

  # ─────────────────────────────
  # Frontend Angular
  # ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: compliara_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    ports:
      - "4200:4200"
    depends_on:
      - backend
    networks:
      - compliara_network

  # ─────────────────────────────
  # Seed (profil optionnel)
  # docker-compose --profile seed up seed
  # ─────────────────────────────
  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: compliara_seed
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    entrypoint: ["sh", "-c", "npx prisma generate && npx prisma db push --accept-data-loss && npm run db:seed"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - compliara_network
    profiles:
      - seed

volumes:
  postgres_data:
  backend_modules:
  frontend_modules:

networks:
  compliara_network:
    driver: bridge
